services:
  postgres:
    image: postgres:18-alpine
    container_name: gocomet_postgres
    environment:
      POSTGRES_USER: gocomet
      POSTGRES_PASSWORD: gocomet_dev
      POSTGRES_DB: gocomet_rides
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gocomet -d gocomet_rides']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: gocomet_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: gocomet_redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - '19092:19092'
      - '18082:18082'
      - '9644:9644'
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD-SHELL', "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:latest
    container_name: gocomet_console
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - '8080:8080'
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped


networks:
  default:
    name: gocomet-network

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
